services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lofi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lofi}
      POSTGRES_DB: ${POSTGRES_DB:-lofi}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lofi}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
